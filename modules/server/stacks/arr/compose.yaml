services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    env_file:
      - /srv/compose/arr/.env
    volumes:
      - /srv/appdata/arr/prowlarr:/config
    ports:
      - "9696:9696"

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    env_file:
      - /srv/compose/arr/.env
    volumes:
      - /srv/appdata/arr/radarr:/config
      - /srv/content/data:/data
    ports:
      - "7878:7878"

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    env_file:
      - /srv/compose/arr/.env
    volumes:
      - /srv/appdata/arr/sonarr:/config
      - /srv/content/data:/data
    ports:
      - "8989:8989"
