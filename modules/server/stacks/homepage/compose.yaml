services:
  homepage:
    container_name: homepage
    image: ghcr.io/gethomepage/homepage:latest
    restart: unless-stopped
    ports:
      - "3002:3000"
    env_file:
      - /srv/compose/homepage/.env
    volumes:
      - /srv/compose/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
