services:
  web:
    image: ghcr.io/karakeep-app/karakeep:${KARAKEEP_VERSION:-release}
    restart: unless-stopped
    depends_on:
      - chrome
      - meilisearch
    volumes:
      - /srv/appdata/karakeep/data:/data
    ports:
      - "3001:3000"
    env_file:
      - /srv/compose/karakeep/.env
    environment:
      MEILI_ADDR: ${MEILI_ADDR}
      BROWSER_WEB_URL: ${BROWSER_WEB_URL}
      DATA_DIR: ${DATA_DIR}

  chrome:
    image: gcr.io/zenika-hub/alpine-chrome:124
    restart: unless-stopped
    command:
      - --no-sandbox
      - --disable-gpu
      - --disable-dev-shm-usage
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
      - --hide-scrollbars

  meilisearch:
    image: getmeili/meilisearch:v1.37.0
    restart: unless-stopped
    env_file:
      - /srv/compose/karakeep/.env
    environment:
      MEILI_NO_ANALYTICS: ${MEILI_NO_ANALYTICS}
    volumes:
      - /srv/appdata/karakeep/meilisearch:/meili_data
